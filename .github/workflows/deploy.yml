name: Deployment
on:
  push:
    branches:
      - master
      - dev
env:      
  MONGODB_DB_NAME: githubsecret         
jobs:
  test:
    env:
      MONGODB_CLUSTER_ADDRESS: githubsecret.xvl64um.mongodb.net
      MONGODB_USERNAME: kevjamesmdyl_db_user
      MONGODB_PASSWORD: dWKrs0bbdM0GzIt0
      PORT: 8080
    environment: testing
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run: echo "...  "
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo "...MONGODB_USERNAME" ${{ env.MONGODB_USERNAME }}
          echo "...MONGODB_PASSWORD" ${{ env.MONGODB_PASSWORD }}
          echo "...MONGODB_CLUSTER_ADDRESS" ${{ env.MONGODB_CLUSTER_ADDRESS }}
          echo "...MONGODB_DB_NAME" ${{ env.MONGODB_DB_NAME }}
          echo "...PORT" ${{ env.PORT }}